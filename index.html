<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Market</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
        <h1>Stock Market Analysis</h1>

        <div class="canvas_time" >
            
            <div class="canvas_wrapper"> <canvas id="stockChart"></canvas></div>
           

            <div class="time_btns">
                <button value="1mo">1 Month</button>
                <button value="3mo">3 Month</button>
                <button value="1y">1 Year</button>
                <button value="5y">5 Years</button>
            </div>
           
        </div>

        <aside class="stocks_list">

        </aside >
        
        <div class="summary">

            <h2 class="summary_heading"> </h2>
            <span class="profit_in_summary"> </span>
            <span class="bookValue_in_summary"> </span>

        </div>
        
        <script src="script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
